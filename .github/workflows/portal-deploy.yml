# Portal Deploy
#
# Builds the portal Docker image once and deploys it to one or more remote hosts.
#
# Triggers:
#   - push to development_master (portal/** changes) → deploys to ALL hosts
#   - workflow_dispatch (manual) → deploys to selected hosts via checkboxes
#
# Jobs:
#   1. prepare-matrix  Decides which environments to deploy based on trigger/inputs
#   2. build           Builds the Docker image and uploads it as a workflow artifact
#   3. deploy          Matrix job — downloads the artifact and deploys to each host in parallel
#
# Required secrets:
#   DEV_HOST, TURN_HOST   — SSH hostnames/IPs
#   DEV_USER              — SSH username
#   DEV_SSH_KEY           — SSH private key
#
# To add a new host: add a secret for the hostname, map it in the deploy job env block,
# add a case in "Resolve host", add a boolean input, and add it to the push matrix.

name: Portal Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_dev:
        description: 'Deploy to DEV host'
        type: boolean
        default: false
      deploy_turn:
        description: 'Deploy to TURN host'
        type: boolean
        default: true
  push:
    branches: [development_master]
    paths:
      - 'portal/**'

env:
  DOCKER_IMAGE_NAME: portal

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build deployment matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # On push, deploy to all hosts
            matrix='{"include":[{"environment":"dev"},{"environment":"turn"}]}'
          else
            # On manual dispatch, deploy only to selected hosts
            includes='[]'
            if [ "${{ inputs.deploy_dev }}" == "true" ]; then
              includes=$(echo "$includes" | jq '. += [{"environment":"dev"}]')
            fi
            if [ "${{ inputs.deploy_turn }}" == "true" ]; then
              includes=$(echo "$includes" | jq '. += [{"environment":"turn"}]')
            fi
            matrix="{\"include\":$includes}"
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm i --production=false
        working-directory: portal

      - name: Build Docker image
        run: |
          cd portal
          docker build -t $DOCKER_IMAGE_NAME:${{ github.sha }} .
          docker save $DOCKER_IMAGE_NAME:${{ github.sha }} > ../app-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: portal-image
          path: app-image.tar
          retention-days: 1

  deploy:
    needs: [prepare-matrix, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false  # a failure on one host should not cancel the other
    env:
      REMOTE_PORT: 22
      ENV_FILE_PATH: /home/ubuntu/deploy/portal/.env
      PEM_FOLDER_PATH: /home/ubuntu/deploy/portal/.pem
      # All host secrets mapped upfront — dynamic secret refs aren't supported in GitHub Actions
      DEV_HOST: ${{ secrets.DEV_HOST }}
      TURN_HOST: ${{ secrets.TURN_HOST }}
      REMOTE_USER: ${{ secrets.DEV_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
    steps:
      - name: Resolve host for environment
        run: |
          case "${{ matrix.environment }}" in
            dev)  echo "REMOTE_HOST=$DEV_HOST"  >> $GITHUB_ENV ;;
            turn) echo "REMOTE_HOST=$TURN_HOST" >> $GITHUB_ENV ;;
            *)    echo "Unknown environment: ${{ matrix.environment }}"; exit 1 ;;
          esac

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: portal-image

      - name: Deploy to ${{ matrix.environment }} host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Copy Docker image to remote host
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -P $REMOTE_PORT \
              app-image.tar \
              $REMOTE_USER@$REMOTE_HOST:/tmp/

          # SSH into remote host and deploy
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p $REMOTE_PORT \
              $REMOTE_USER@$REMOTE_HOST <<EOF
            DOCKER_IMAGE_NAME="${{ env.DOCKER_IMAGE_NAME }}"
            ENV_FILE_PATH="${{ env.ENV_FILE_PATH }}"
            PEM_FOLDER_PATH="${{ env.PEM_FOLDER_PATH }}"

            docker load -i /tmp/app-image.tar
            rm /tmp/app-image.tar

            docker stop \$DOCKER_IMAGE_NAME || true
            docker rm \$DOCKER_IMAGE_NAME || true

            if [ ! -f "\$ENV_FILE_PATH" ]; then
              echo "Error: .env file not found at \$ENV_FILE_PATH"
              exit 1
            fi

            if [ ! -d "\$PEM_FOLDER_PATH" ]; then
              echo "Error: .pem folder not found at \$PEM_FOLDER_PATH"
              exit 1
            fi

            docker run -d \
              --name \$DOCKER_IMAGE_NAME \
              --restart unless-stopped \
              -p 3004:3004 \
              --env-file \$ENV_FILE_PATH \
              -v \$PEM_FOLDER_PATH:/app/.pem \
              --mount type=bind,src=/etc/letsencrypt,dst=/etc/letsencrypt,ro \
              \$DOCKER_IMAGE_NAME:${{ github.sha }}

            docker image prune -f
            echo "Portal deployment to ${{ matrix.environment }} completed successfully"
          EOF

      - name: Verify deployment on ${{ matrix.environment }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p $REMOTE_PORT \
              $REMOTE_USER@$REMOTE_HOST \
              "docker ps | grep $DOCKER_IMAGE_NAME && echo 'Portal deployment on ${{ matrix.environment }} successful!'"
