name: auth-gateway-turn

on:
  push:
    branches: [development_master]  
    paths:
      - 'auth-gateway/**'
  workflow_dispatch: 

env:
  DOCKER_IMAGE_NAME: auth-gateway
  REMOTE_HOST: ${{ secrets.TURN_HOST }}
  REMOTE_USER: ${{ secrets.DEV_USER }}
  REMOTE_PORT: 22
  ENV_FILE_PATH: /home/ubuntu/deploy/auth-gateway/.env
  PEM_FOLDER_PATH: /home/ubuntu/deploy/auth-gateway/.pem

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: auth-gateway/package-lock.json

    - name: Install dependencies
      working-directory: auth-gateway
      run: npm ci --production=false

    - name: Build and Save Docker image
      run: |
        # Build using the folder as context
        docker build -t $DOCKER_IMAGE_NAME:${{ github.sha }} ./auth-gateway
        docker save $DOCKER_IMAGE_NAME:${{ github.sha }} > app-image.tar

    - name: Deploy to remote host
      env:
        SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        
        # SCP to transfer the tarball
        scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -P $REMOTE_PORT \
            app-image.tar \
            $REMOTE_USER@$REMOTE_HOST:/tmp/
        
        # SSH to execute deployment
        ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -p $REMOTE_PORT \
            $REMOTE_USER@$REMOTE_HOST <<'EOF'
            # Use the variables mapped from GitHub env
            DOCKER_IMAGE_NAME="${{ env.DOCKER_IMAGE_NAME }}"
            ENV_FILE_PATH="${{ env.ENV_FILE_PATH }}"
            PEM_FOLDER_PATH="${{ env.PEM_FOLDER_PATH }}"
            GITHUB_SHA="${{ github.sha }}"
            
            docker load -i /tmp/app-image.tar
            rm /tmp/app-image.tar
            
            docker stop $DOCKER_IMAGE_NAME || true
            docker rm $DOCKER_IMAGE_NAME || true
            
            # Use $GITHUB_SHA (the local shell var) here
            docker run -d \
                --name $DOCKER_IMAGE_NAME \
                --restart unless-stopped \
                -p 3030:3030 \
                --env-file $ENV_FILE_PATH \
                -v $PEM_FOLDER_PATH:/app/.pem \
                --mount type=bind,src=/etc/letsencrypt,dst=/etc/letsencrypt,ro \
                $DOCKER_IMAGE_NAME:$GITHUB_SHA
            
            docker image prune -f
            echo "Deployment finished."
        EOF

    - name: Verify deployment
      env:
        SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
      run: |
        ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -p $REMOTE_PORT \
            $REMOTE_USER@$REMOTE_HOST \
            "docker ps | grep $DOCKER_IMAGE_NAME && echo 'Verify: Container is running!'"
